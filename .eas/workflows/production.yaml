name: Production Pipeline

on:
  push:
    branches:
      - main

jobs:
  lint:
    name: Lint & Type Check
    type: custom
    steps:
      - uses: eas/checkout

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type Check
        run: npm run typecheck

  build_ios:
    name: Build iOS
    type: build
    needs: [lint]
    params:
      platform: ios
      profile: production

  build_android:
    name: Build Android
    type: build
    needs: [lint]
    params:
      platform: android
      profile: production

  submit_ios:
    name: Submit iOS
    type: submit
    needs: [build_ios]
    params:
      platform: ios
      profile: production

  submit_android:
    name: Submit Android
    type: submit
    needs: [build_android]
    params:
      platform: android
      profile: production
